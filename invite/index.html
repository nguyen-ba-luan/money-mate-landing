<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tham gia nhóm trên Moni</title>
  <link rel="icon" href="/favicon.ico" />
  <meta name="robots" content="noindex, follow" />
  <meta name="description" content="Bạn được mời tham gia nhóm trên Moni - ứng dụng quản lý chi tiêu" />
  <meta property="og:title" content="Tham gia nhóm trên Moni" />
  <meta property="og:description" content="Bạn được mời tham gia nhóm chi tiêu trên Moni" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://moni.live/invite/" />
  <meta property="og:site_name" content="Moni" />
  <meta property="og:image" content="https://moni.live/images/og-image-invite.jpg?v=1" />
  <meta property="og:image:secure_url" content="https://moni.live/images/og-image-invite.jpg?v=1" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:locale" content="vi_VN" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Tham gia nhóm trên Moni" />
  <meta name="twitter:description" content="Bạn được mời tham gia nhóm chi tiêu trên Moni" />
  <meta name="twitter:image" content="https://moni.live/images/og-image-invite.jpg?v=1" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #FFF7ED, #FFFFFF);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(249, 115, 22, 0.12);
    }
    .logo { margin-bottom: 16px; }
    .logo img { width: 72px; height: 72px; border-radius: 16px; }
    h1 { font-size: 22px; color: #09090B; margin-bottom: 8px; }
    .subtitle { color: #71717A; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
    .code-label { font-size: 12px; color: #A1A1AA; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .code {
      background: #F4F4F5;
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 20px;
      font-weight: 700;
      color: #09090B;
      letter-spacing: 2px;
      margin-bottom: 24px;
      word-break: break-all;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }
    .code:hover { background: #E4E4E7; }
    .code:active { background: #D4D4D8; }
    .copied {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      background: #09090B;
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .copied.show { opacity: 1; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
      transition: opacity 0.2s;
      border: none;
      cursor: pointer;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary {
      background: linear-gradient(135deg, #F97316, #F59E0B);
      color: white;
    }
    .divider { color: #A1A1AA; font-size: 12px; margin: 16px 0; }
    .steps {
      text-align: left;
      background: #FAFAFA;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .steps ol { padding-left: 20px; }
    .steps li { color: #52525B; font-size: 13px; line-height: 1.8; }
    .steps li strong { color: #09090B; }
    .store-links { display: flex; gap: 10px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
    .store-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #000;
      color: #fff;
      padding: 9px 16px;
      border-radius: 12px;
      text-decoration: none;
      transition: transform 0.15s, opacity 0.15s;
    }
    .store-badge:hover { transform: translateY(-2px); opacity: 0.9; }
    .store-badge svg { width: 24px; height: 24px; flex-shrink: 0; }
    .store-badge .badge-text-sm { display: block; font-size: 10px; opacity: 0.75; line-height: 1; }
    .store-badge .badge-text-lg { display: block; font-size: 14px; font-weight: 600; line-height: 1.3; }
    .error { color: #EF4444; font-size: 14px; padding: 40px 0; }
  </style>
</head>
<body>
  <div class="card" id="card"></div>

  <script>
    var APP_SCHEME = 'moneymate';
    var IOS_STORE = 'https://apps.apple.com/app/id6759211409';
    var ANDROID_STORE = 'https://play.google.com/store/apps/details?id=com.code4change.moneymate';

    // Extract code from URL path: /invite/CODE or /invite/?code=CODE
    var path = window.location.pathname;
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');

    // Support /invite/CODE path format
    if (!code) {
      var match = path.match(/\/invite\/([A-Za-z0-9]+)/);
      if (match) code = match[1];
    }

    var card = document.getElementById('card');

    if (!code || code.length < 8) {
      card.innerHTML = '<div class="logo">🐷</div><p class="error">Mã mời không hợp lệ</p>';
    } else {
      var deepLink = APP_SCHEME + '://invite/' + code;

      card.innerHTML =
        '<div class="logo"><img src="/images/moni-icon.png" alt="Moni" /></div>' +
        '<h1>Bạn được mời tham gia nhóm</h1>' +
        '<p class="subtitle">Mở ứng dụng Moni để tham gia nhóm.</p>' +
        '<div class="code-label">Mã mời</div>' +
        '<div class="code" id="codeBox" onclick="copyCode()">' +
          '<span class="copied" id="copiedTip">Đã sao chép!</span>' +
          code +
        '</div>' +
        '<a href="' + deepLink + '" class="btn btn-primary" id="openBtn">Mở Moni</a>' +
        '<div class="steps">' +
          '<ol>' +
            '<li>Mở ứng dụng <strong>Moni</strong></li>' +
            '<li>Vào tab <strong>Nhóm</strong> → bấm <strong>Nhập mã mời</strong></li>' +
            '<li>Dán mã ở trên → bấm <strong>Tham gia</strong></li>' +
          '</ol>' +
        '</div>' +
        '<p class="divider">Chưa có Moni?</p>' +
        '<div class="store-links">' +
          '<a href="' + IOS_STORE + '" target="_blank" rel="noopener noreferrer" class="store-badge">' +
            '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>' +
            '<div><span class="badge-text-sm">Download on the</span><span class="badge-text-lg">App Store</span></div>' +
          '</a>' +
          '<a href="' + ANDROID_STORE + '" target="_blank" rel="noopener noreferrer" class="store-badge">' +
            '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 01-.61-.92V2.734a1 1 0 01.609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.199l2.302 2.302a1 1 0 010 1.38l-2.302 2.302L15.396 12l2.302-3.492zM5.864 2.658L16.8 8.99l-2.302 2.302-8.634-8.634z"/></svg>' +
            '<div><span class="badge-text-sm">Get it on</span><span class="badge-text-lg">Google Play</span></div>' +
          '</a>' +
        '</div>';

      // Auto-attempt deep link
      setTimeout(function() { window.location.href = deepLink; }, 500);
    }

    function copyCode() {
      if (!code) return;
      navigator.clipboard.writeText(code).then(function() {
        var tip = document.getElementById('copiedTip');
        tip.classList.add('show');
        setTimeout(function() { tip.classList.remove('show'); }, 1500);
      });
    }
  </script>
</body>
</html>
